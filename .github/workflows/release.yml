name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: genesis-rs-x86_64-linux
            apt_pkgs: musl-tools
          - target: aarch64-unknown-linux-musl
            artifact: genesis-rs-aarch64-linux
            apt_pkgs: gcc-aarch64-linux-gnu musl-tools
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache APT packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-release-${{ matrix.target }}-v1

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ${{ matrix.apt_pkgs }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/genesis-rs dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
