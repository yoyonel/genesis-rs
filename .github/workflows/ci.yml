name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate (fmt, lint, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        rust: [stable, "1.85.0"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-quality-${{ matrix.rust }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-quality-${{ matrix.rust }}-

      - name: Install Just
        uses: extractions/setup-just@v4

      - name: Install actionlint
        if: matrix.rust == 'stable'
        run: |
          curl -sL "https://github.com/rhysd/actionlint/releases/latest/download/actionlint_$(curl -sL https://api.github.com/repos/rhysd/actionlint/releases/latest | jq -r .tag_name | sed 's/^v//')_linux_amd64.tar.gz" | sudo tar xz -C /usr/local/bin actionlint

      - name: Check formatting
        if: matrix.rust == 'stable'
        run: just format-check

      - name: Lint (Rust + CI + Actions)
        if: matrix.rust == 'stable'
        run: just lint
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Lint (clippy only, MSRV)
        if: matrix.rust != 'stable'
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: just test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/bin/cargo-deny
          key: cargo-security-${{ runner.os }}-v2

      - name: Run cargo audit
        run: |
          command -v cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked
          cargo audit

      - name: Run cargo deny
        run: |
          command -v cargo-deny >/dev/null 2>&1 || cargo install cargo-deny --locked
          cargo deny check all

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & tarpaulin
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tarpaulin
            target
          key: cargo-coverage-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-coverage-

      - name: Install cargo-tarpaulin
        run: command -v cargo-tarpaulin >/dev/null 2>&1 || cargo install cargo-tarpaulin --locked

      - name: Run coverage
        run: cargo tarpaulin --skip-clean --out Stdout --out Html
        
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: tarpaulin-report.html

  build:
    name: Build Multi-Arch binaries
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-build-
          
      - name: Cache APT packages (cross-linker)
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-build-cross-v1

      - name: Install Cross-Linker
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu musl-tools
        
      - name: Install Just
        uses: extractions/setup-just@v4

      - name: Build x86_64
        run: just build
        
      - name: Build ARM64
        run: just build-arm-native

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: genesis-binaries
          path: target/**/release/genesis-rs

  e2e-test:
    name: E2E Verify - ${{ matrix.os }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: debian
            port: 22221
            target: x86_64-unknown-linux-musl
            qemu_pkgs: "qemu-system-x86 qemu-utils genisoimage"
          - os: arch
            port: 22222
            target: x86_64-unknown-linux-musl
            qemu_pkgs: "qemu-system-x86 qemu-utils genisoimage"
          - os: raspbian
            port: 22223
            target: aarch64-unknown-linux-musl
            qemu_pkgs: "qemu-system-arm qemu-utils genisoimage qemu-efi-aarch64 ipxe-qemu"
            
    steps:
      - uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: genesis-binaries
          path: target

      - name: Fix binary permissions
        run: find target -name genesis-rs -type f -exec chmod +x {} \;

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm

      - name: Cache APT packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-e2e-${{ matrix.os }}-v1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.qemu_pkgs }}
          
      - name: Install Just
        uses: extractions/setup-just@v4

      - name: Cache Cloud Images
        id: cache-images
        uses: actions/cache@v5
        with:
          path: tests/e2e/*.qcow2
          key: cloud-images-v2-${{ matrix.os }}

      - name: Provision VM
        run: just provision-${{ matrix.os }}

      - name: Run E2E Verification (System Info)
        run: just ci-test ${{ matrix.os }} ${{ matrix.port }} ${{ matrix.target }} "true"
        timeout-minutes: 8
