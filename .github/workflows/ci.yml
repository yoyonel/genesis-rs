name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  quality:
    name: Quality Gate (fmt, lint, test, audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-quality-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-quality-

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Install actionlint
        run: |
          curl -sL "https://github.com/rhysd/actionlint/releases/latest/download/actionlint_$(curl -sL https://api.github.com/repos/rhysd/actionlint/releases/latest | jq -r .tag_name | sed 's/^v//')_linux_amd64.tar.gz" | sudo tar xz -C /usr/local/bin actionlint

      - name: Check formatting
        run: just format-check

      - name: Lint (Rust + CI + Actions)
        run: just lint
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests
        run: just test

      - name: Security audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit

  build:
    name: Build Multi-Arch binaries
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-build-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-build-
          
      - name: Install Cross-Linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
        
      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Build x86_64
        run: just build
        
      - name: Build ARM64
        run: just build-arm-native

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: genesis-binaries
          path: target/**/release/genesis-rs

  e2e-test:
    name: E2E Verify - ${{ matrix.os }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: debian
            port: 22221
            target: x86_64-unknown-linux-musl
          - os: arch
            port: 22222
            target: x86_64-unknown-linux-musl
          - os: raspbian
            port: 22223
            target: aarch64-unknown-linux-musl
            
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: genesis-binaries
          path: target

      - name: Fix binary permissions
        run: find target -name genesis-rs -type f -exec chmod +x {} \;

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-system-arm qemu-utils genisoimage qemu-efi-aarch64
          
      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Cache Cloud Images
        id: cache-images
        uses: actions/cache@v4
        with:
          path: tests/e2e/*.qcow2
          key: cloud-images-v2-${{ matrix.os }}

      - name: Provision VM
        run: just provision-${{ matrix.os }}

      - name: Run E2E Verification (System Info)
        run: just ci-test ${{ matrix.os }} ${{ matrix.port }} ${{ matrix.target }} "true"
        timeout-minutes: 15
